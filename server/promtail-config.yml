server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  # Persists read offsets so Promtail doesn't re-send logs after a restart.
  filename: /tmp/promtail/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: docker-containers

    # Read directly from Docker's JSON log files.
    static_configs:
      - targets:
          - localhost
        labels:
          job: docker
          __path__: /var/lib/docker/containers/*/*-json.log

    pipeline_stages:
      # Parse the Docker JSON log wrapper {"log":"...","stream":"...","time":"..."}.
      - json:
          expressions:
            output: log
            stream: stream
            timestamp: time
            tag: attrs.tag     # populated by the "tag" log-opt in docker-compose

      # Extract the container name from the tag label we set via log options.
      - regex:
          expression: '^(?P<container>[^/]+)$'
          source: tag

      # Promote extracted fields to Loki stream labels so you can filter by
      # container name in Grafana: {container="game-monitor-server"}
      - labels:
          container:
          stream:

      # Use the Docker timestamp as the log line timestamp.
      - timestamp:
          source: timestamp
          format: RFC3339Nano

      # The actual log line content.
      - output:
          source: output
