apiVersion: 1

datasources:
  # ── Loki — container logs ──────────────────────────────────────────────────
  - name: Loki
    type: loki
    uid: loki
    url: http://loki:3100
    access: proxy
    isDefault: true
    jsonData:
      maxLines: 1000

  # ── TimescaleDB — gaming data (PostgreSQL datasource) ─────────────────────
  # Lets you write raw SQL queries in Grafana to visualise sessions,
  # activity scores, click heatmaps, etc. — without going through the Go API.
  - name: TimescaleDB
    type: postgres
    uid: timescaledb
    url: timescaledb:5432
    user: postgres
    secureJsonData:
      password: ${DB_PASSWORD}   # injected from the environment at container start
    jsonData:
      database: game_metrics
      sslmode: disable
      timescaledb: true
      postgresVersion: 1500
