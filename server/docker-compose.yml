# ---------------------------------------------------------------------------
# Container logs: json-file driver with rotation (view with docker compose logs).
# ---------------------------------------------------------------------------
x-logging: &default-logging
  driver: json-file
  options:
    max-size: "20m"
    max-file: "5"
    tag: "{{.Name}}"

services:

  # ── Database ───────────────────────────────────────────────────────────────
  timescaledb:
    image: timescale/timescaledb:latest-pg15
    container_name: game-monitor-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: game_metrics
    volumes:
      - db_data:/var/lib/postgresql/data
    # Host 5433 -> container 5432 (5433 avoids clash with a local Postgres on 5432).
    ports:
      - "5433:5432"
    restart: unless-stopped
    logging: *default-logging
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Go API server ──────────────────────────────────────────────────────────
  server:
    build: .
    container_name: game-monitor-server
    environment:
      PORT: "8000"
      DATABASE_URL: postgres://postgres:${DB_PASSWORD}@timescaledb:5432/game_metrics?sslmode=disable
      JWT_SECRET: ${JWT_SECRET}
    # 8000:8000 — доступ с этой машины и по LAN (клиент на другом ПК в сети).
    # На VPS за Nginx смените на "127.0.0.1:8000:8000", чтобы API не светился наружу.
    ports:
      - "8000:8000"
    depends_on:
      timescaledb:
        condition: service_healthy
    restart: unless-stopped
    logging: *default-logging

volumes:
  db_data:
