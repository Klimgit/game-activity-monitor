# ---------------------------------------------------------------------------
# Container logs: json-file driver with rotation (view with docker compose logs).
# ---------------------------------------------------------------------------
x-logging: &default-logging
  driver: json-file
  options:
    max-size: "20m"
    max-file: "5"
    tag: "{{.Name}}"

services:

  # ── Database ───────────────────────────────────────────────────────────────
  timescaledb:
    image: timescale/timescaledb:latest-pg15
    container_name: game-monitor-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: game_metrics
    volumes:
      - db_data:/var/lib/postgresql/data
    # Host 5433 -> container 5432 (5433 avoids clash with a local Postgres on 5432).
    ports:
      - "5433:5432"
    restart: unless-stopped
    logging: *default-logging
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── ML inference (optional): `docker compose --profile ml up -d` and copy classifier.joblib to ml/models/
  inference:
    profiles: ["ml"]
    build:
      context: ../ml/inference
      dockerfile: Dockerfile
    container_name: game-monitor-inference
    environment:
      MODEL_PATH: /models/classifier.joblib
    volumes:
      - ../ml/models:/models:ro
    ports:
      - "8090:8090"
    depends_on:
      timescaledb:
        condition: service_healthy
    restart: unless-stopped
    logging: *default-logging

  # ── Go API server ──────────────────────────────────────────────────────────
  server:
    build: .
    container_name: game-monitor-server
    environment:
      PORT: "8000"
      DATABASE_URL: postgres://postgres:${DB_PASSWORD}@timescaledb:5432/game_metrics?sslmode=disable
      JWT_SECRET: ${JWT_SECRET}
      ML_INFERENCE_URL: ${ML_INFERENCE_URL:-}
    ports:
      - "8000:8000"
    depends_on:
      timescaledb:
        condition: service_healthy
    restart: unless-stopped
    logging: *default-logging

volumes:
  db_data:
