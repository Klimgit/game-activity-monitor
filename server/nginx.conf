# =============================================================================
# Nginx configuration for game-activity-monitor
#
# Install on the host (not inside Docker) so it can handle SSL termination.
# Copy to /etc/nginx/sites-available/game-monitor and symlink to sites-enabled.
#
# Replace every occurrence of YOUR_DOMAIN with your actual domain.
# SSL certificates are managed by Certbot (Let's Encrypt) — see DEPLOY.md.
# =============================================================================

# Redirect plain HTTP → HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name YOUR_DOMAIN;

    # Let's Encrypt ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name YOUR_DOMAIN;

    # ── SSL (filled in by certbot --nginx) ────────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/YOUR_DOMAIN/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/YOUR_DOMAIN/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;

    # ── Security headers ──────────────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header X-Frame-Options           DENY                                  always;
    add_header X-Content-Type-Options    nosniff                               always;
    add_header Referrer-Policy           "no-referrer-when-downgrade"          always;

    # ── Logging ───────────────────────────────────────────────────────────
    access_log /var/log/nginx/game-monitor.access.log;
    error_log  /var/log/nginx/game-monitor.error.log;

    # Client max body for metrics batch uploads (~5 000 events × ~200 bytes)
    client_max_body_size 10m;

    # ── React dashboard (static files) ───────────────────────────────────
    # Build with: cd dashboard && npm run build
    # Copy dist/ to: /var/www/game-monitor/
    root /var/www/game-monitor;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Go API server ─────────────────────────────────────────────────────
    location /api/ {
        proxy_pass         http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }
}
