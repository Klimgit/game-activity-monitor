server:
  url: "http://127.0.0.1:8000"
  auto_reconnect: true
  reconnect_interval: 30s

auth:
  email: ""
  password: ""

# Used when you choose Session → Start session (no prompt). Can be empty; set the name in the web dashboard later.
session:
  default_game_name: ""

collectors:
  intervals:
    system_polling: 2s
    aggregation_window: 10s
  enabled:
    - mouse
    - keyboard
    - system   # merged collector: cpu + memory + active process in one event
    - gpu      # enables nvidia-smi / sysfs GPU utilization probe (set collectGPU=true)

offline:
  max_queue_size: 50000
  flush_interval: 5s
