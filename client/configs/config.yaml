server:
  url: "http://127.0.0.1:8000"
  auto_reconnect: true
  reconnect_interval: 30s

auth:
  email: ""
  password: ""

session:
  default_game_name: ""

collectors:
  intervals:
    system_polling: 2s
    aggregation_window: 10s
  enabled:
    - mouse
    - keyboard
    - system
    - gpu

offline:
  max_queue_size: 50000
  flush_interval: 5s
